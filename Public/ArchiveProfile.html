<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name ="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Graveyard Shift Productions">
        <title> Archive | Profile </title>
        <link href="https://fonts.googleapis.com/css2?display=swap&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600;1,700&family=Vollkorn:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600;1,700;1,900&family=Syne+Tactile:ital,wght@0,400;1,400" rel="stylesheet">
        <link rel="stylesheet" href="archive.css">
        <link rel="icon" href="assets/headlogo.png">
        <script defer src="Profile.js"></script>
    </head>
    <body>
        <div class="container">
        <div id="profileContainer">

            <div class="left">
                <img id="profileImage" src="assets/profile.png" alt="Profile Image">
                <label id="uploadBtn" for="imageUpload">Change Profile Image</label>
                <input type="file" id="imageUpload" accept="image/*">

                <div class="info-section">
                    <h3>Basic Info</h3>
                    <p><strong>Agent Name:</strong> <span id="usernameText"></span></p>
                    <p><strong>Email:</strong> <span id="emailText"></span></p>
                </div>

                 <div class="missions-section">
                    <h3>Mission Progress</h3>
                    <div id="missionsList"></div>
                </div>
            </div>

            <div class="right">
                <div class="form-section">
                    <h3>Edit Profile</h3>
                    <div class="form-group">
                        <label for="username">Agent Name:</label>
                        <input type="text" id="username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password">
                    </div>
                    <div class="form-group">
                        <label for="profile">Profile Description:</label>
                        <textarea id="profile" rows="5" placeholder="Write your agent profile..."></textarea>
                    </div>
                    <button id="saveBtn">Save Changes</button>
                    <button id="logoutBtn">Log Out</button>
                </div>

            </div>
        </div>
    </div>
    </body>
</html>
