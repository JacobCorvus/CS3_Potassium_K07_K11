        let current = "start";

        function updateProgress() {
            progressBar.style.width = move + "%";
        }

        function render() {
            let scene = game[current];

            wordsElement.textContent = scene.text;

            if (scene.option1) {
                butt1.style.display = "inline-block";
                butt1.textContent = scene.option1.text;
            } else {
                butt1.style.display = "none";
            }

            if (scene.option2) {
                butt2.style.display = "inline-block";
                butt2.textContent = scene.option2.text;
            } else {
                butt2.style.display = "none";
            }

            if((current === "end")||(current === "badend")||(current === "goodend")) {
                setTimeout(() => {
                    document.body.classList.add("fade-out");

                    setTimeout(() => {
                        window.location.href = "Archive.html";
                    }, 1000);
                }, 1000);
            }
        }

        function choose(option) {
            let scene = game[current];
            let chosen = scene[option];

            move += chosen.effect;
            if (move < 0) move = 0;
            if (move > 100) move = 100;

            updateProgress();

            current = chosen.next;
            render();
        }

        butt1.onclick = () => choose("option1");
        butt2.onclick = () => choose("option2");

        render();
