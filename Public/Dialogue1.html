<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name ="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Graveyard Shift Productions">
        <title> Back-alley Interrogation </title>
        <link rel="stylesheet" href="DialogueCss.css">
        <link href="https://fonts.googleapis.com/css2?display=swap&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600;1,700&family=Vollkorn:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600;1,700;1,900&family=Syne+Tactile:ital,wght@0,400;1,400" rel="stylesheet">
        <link rel="icon" href="assets/headlogo.png">
    </head>
    <body>
        <div class="layout">
            <div class="container">
                <div class = "pContainer">
                    <div class="progress"></div>
                </div>

                <div class="dialogue">
                    <p class="words"></p>
                    
                    <button class="butt1"> Option 1</button>
                    <button class="butt2"> Option 2</button>
                </div>
            </div>
            <div class="profile">
                <h2> Suspect Profile </h2>

                <img src="assets/profile.png" class="susImg">

                <p>Name: Unknown</p>
                <p>Age: Unknown</p>
                <p>Occupation: Smuggler</p>
                <p>Appearance: Red head, dressed like a he came from a gang</p>
                <p>Description: Arrogant kid, annoying </p>
            </div>
        </div>
    </body>

    <script>
        const wordsElement = document.querySelector(".words");
        const progressBar = document.querySelector(".progress");
        const butt1 = document.querySelector(".butt1");
        const butt2 = document.querySelector(".butt2");

        let move = 0;

        const game = {
            start: {
                text: "Suspect: Good'evening.",
                option1: {
                    text: "Goodevening, shall we get started?",
                    next: "threat1",
                    effect: 20
                },
                option2: {
                    text: "Enough with formalities.",
                    next: "persuade1",
                    effect: 10
                }
            },

            threat1: {
                text: "Suspect: Ahh, alright. But I swear I wasnt doing nothing!",
                option1: {
                    text: "Really now? Then where were you last night?",
                    next: "threat2",
                    effect: 10
                },
                option2: {
                    text: "Nothing? Doing nothing by the border last night too? ",
                    next: "start",
                    effect: 10
                }
            },

            persuade1: {
                text: "Suspect: Alright, alright. What do you want? Cause I have nothing on me.",
                option1: {
                    text: "I know you were there. Just tell me what you were doing.",
                    next: "threat2",
                    effect: 20
                },
                option2: {
                    text: "I could get you arrested if you keep lying like that.",
                    next: "threat1",
                    effect: -5
                }
            },

            threat2: {
                text: "Suspect: I was down by the city of course. Nowhere near the border, thats what im sure of.",
                option1: {
                    text: "I didnt ask anything about the border.",
                    next: "threat3",
                    effect: 25
                },
                option2: {
                    text: "What are you talking about?",
                    next: "threat3",
                    effect: 5
                }
            },

            threat3: {
                text: "Suspect: What? I was just saying that I wasnt near the border. W-whats wrong with that?",
                option1: {
                    text: "Yeah, gimme more proof that you werent and maybe I wont show PATRON heads these photos.",
                    next: "truth",
                    effect: 30
                },
                option2: {
                    text: "So youre thinking about something not important and nervous because of it. Right...",
                    next: "truth",
                    effect: 25
                }
            },

            truth: {
                text: "Suspect: Alright fine. Im bringing in illegal immigrants. Gonna lock me up now?.",
                option1: {
                    text: "Not exactly.",
                    next: "truth2",
                    effect: 40
                },
                option2: {
                    text: "Well it depends.",
                    next: "truth2",
                    effect: 20
                }
            },

            truth2: {
                text: "Suspect: What do you mean? I thought you were gonna arrest me.",
                option1: {
                    text: "I could arrest you, but I want to know more about your operation. Tell me about it.",
                    next: "truth3",
                    effect: 0
                },
                option2: {
                    text: "I dont really like PATRON all that much either. Would be a shame to lock someone up for helping others out like you do.",
                    next: "truth3",
                    effect: 0
                }
            },

            truth3: {
                text: "Suspect: In that case, I guess I could tell you about it.",
                option1: {
                    text: "...",
                    next: "truth4",
                    effect: 0
                },
                option2: {
                    text: "Go ahead.",
                    next: "truth4",
                    effect: 0
                }
            },

            truth4: {
                text: "Suspect: I bring in immigrants from anexxed areas outside the city. I get them across the wastes and from the border. I get paid, sure. But even then I do it just because I want to.",
                option1: {
                    text: "I see. Thanks for telling me.",
                    next: "end",
                    effect: 0
                },

                option2: {
                    text: "Quite the operation you have there.",
                    next: "end",
                    effect: 0
                }
            },

            end: {
                text: "Suspect: Yeah, well. I guess I should be careful about who I tell about it. Thanks for not arresting me.",
            }
        };

        let current = "start";

        function updateProgress() {
            progressBar.style.width = move + "%";
        }

        function render() {
            let scene = game[current];

            wordsElement.textContent = scene.text;

            if (scene.option1) {
                butt1.style.display = "inline-block";
                butt1.textContent = scene.option1.text;
            } else {
                butt1.style.display = "none";
            }

            if (scene.option2) {
                butt2.style.display = "inline-block";
                butt2.textContent = scene.option2.text;
            } else {
                butt2.style.display = "none";
            }
        }

        function choose(option) {
            let scene = game[current];
            let chosen = scene[option];

            move += chosen.effect;
            if (move < 0) move = 0;
            if (move > 100) move = 100;

            updateProgress();

            current = chosen.next;
            render();
        }

        butt1.onclick = () => choose("option1");
        butt2.onclick = () => choose("option2");

        render();
</script>
</html>
