        <link rel="stylesheet" href="BBhomestyle.css">
        <link rel="icon" href="assets/headlogo.png">
    </head>
    <body>

        <script>
            const access = sessionStorage.getItem("archiveAccess");
            if (access !== "granted") {
                window.location.href = "ArchiveAccess.html";
            }

            if (localStorage.getItem("archiveAccess") !== "granted") {
                window.location.href = "PasscodePage.html";
            }

        </script>

        <nav class="navBar">
            <ul class ="dropDown">
                <li class="dropBtn" id="menuToggle">
                <img src="assets/Menu.png">
                    <ul class="dropCon">
                        <li><a href="a">Archive</a></li>
                    </ul>
                </li>
            </ul>
            <div class="centered">
                <ul class="navLinks">
                    <li><a href ="BluebloodsCharacters.html">Characters</a></li>
                    <li><a href="BluebloodsWorld.html">World</a></li>
                </ul>
                <a href="BluebloodsHome.html" class="loogo">

                <ul class="navLinks">
                    <li><a href ="BluebloodsGallery.html">Gallery</a></li>
                    <li><a href ="BluebloodsChapters.html">Story</a></li>
                </ul>
            </div>
            <script>
                const menuToggle = document.getElementById("menuToggle");

                if (menuToggle) {
                    menuToggle.addEventListener("click", function(e) {
                        e.stopPropagation();
                        menuToggle.classList.toggle("open");
                });

                document.addEventListener("click", function() {
                    menuToggle.classList.remove("open");
                });
                }
                </script>

        <div class="container">
            <div class="line"></div>
            <h1>Passcode Required</h1>
            <h4>Access blocked until passcode attained</h4>
            <div class="line"></div>

                <form id="passForm">
                    <div class="inputCon">
                    <label for="passcodeInput">Agent Passcode</label>
                    <input id="passcodeInput" type="text" required>
                    <div class="error"></div>

                    <input type="text" id="agentName" placeholder="Agent Username" required>
                    <input type="password" id="passcode" placeholder="Passcode" required>
                    <button type="submit">Enter Archive</button>
                    <p id="errorMessage"></p>
            </div>
            </form>
        </div>
        </div>
        window.addEventListener("beforeunload", () => {
        sessionStorage.removeItem("archiveAccess");
        });
